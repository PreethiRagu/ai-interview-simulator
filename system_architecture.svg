<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- USER -->
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#2a2a3a" stroke="#555" stroke-width="0.8"/>
  <text x="340" y="47" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">User / Browser</text>

  <!-- Arrow User to Frontend -->
  <line x1="340" y1="64" x2="340" y2="96" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="350" y="84" fill="#888" font-size="11">HTTPS</text>

  <!-- FRONTEND -->
  <rect x="80" y="98" width="520" height="130" rx="12" fill="#2d1f4e" stroke="#7c5cbf" stroke-width="0.8"/>
  <text x="340" y="120" text-anchor="middle" fill="#c9b8f0" font-size="13" font-weight="600">Frontend — Next.js 14 + TypeScript</text>
  <text x="340" y="138" text-anchor="middle" fill="#9a87cc" font-size="11">Deployed on Vercel</text>

  <rect x="102" y="150" width="98" height="62" rx="6" fill="#1e1830" stroke="#555" stroke-width="0.6"/>
  <text x="151" y="174" text-anchor="middle" fill="#c9b8f0" font-size="12" font-weight="600">Landing</text>
  <text x="151" y="192" text-anchor="middle" fill="#9a87cc" font-size="10">Hero + CTA</text>

  <rect x="212" y="150" width="98" height="62" rx="6" fill="#1e1830" stroke="#555" stroke-width="0.6"/>
  <text x="261" y="174" text-anchor="middle" fill="#c9b8f0" font-size="12" font-weight="600">Dashboard</text>
  <text x="261" y="192" text-anchor="middle" fill="#9a87cc" font-size="10">Stats + charts</text>

  <rect x="322" y="150" width="98" height="62" rx="6" fill="#1e1830" stroke="#555" stroke-width="0.6"/>
  <text x="371" y="174" text-anchor="middle" fill="#c9b8f0" font-size="12" font-weight="600">Interview</text>
  <text x="371" y="192" text-anchor="middle" fill="#9a87cc" font-size="10">Live session</text>

  <rect x="432" y="150" width="148" height="62" rx="6" fill="#1e1830" stroke="#555" stroke-width="0.6"/>
  <text x="506" y="174" text-anchor="middle" fill="#c9b8f0" font-size="12" font-weight="600">Results</text>
  <text x="506" y="192" text-anchor="middle" fill="#9a87cc" font-size="10">Scores + feedback</text>

  <!-- Arrow Frontend to Backend -->
  <line x1="340" y1="228" x2="340" y2="278" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="350" y="257" fill="#888" font-size="11">REST API</text>

  <!-- BACKEND -->
  <rect x="80" y="280" width="520" height="140" rx="12" fill="#0d3028" stroke="#1a7a5e" stroke-width="0.8"/>
  <text x="340" y="302" text-anchor="middle" fill="#7ecfb3" font-size="13" font-weight="600">Backend — FastAPI (Python)</text>
  <text x="340" y="320" text-anchor="middle" fill="#4da88a" font-size="11">Deployed on Render</text>

  <rect x="100" y="332" width="144" height="74" rx="6" fill="#061e16" stroke="#555" stroke-width="0.6"/>
  <text x="172" y="354" text-anchor="middle" fill="#7ecfb3" font-size="12" font-weight="600">Auth routes</text>
  <text x="172" y="372" text-anchor="middle" fill="#4da88a" font-size="10">POST /users/login</text>
  <text x="172" y="390" text-anchor="middle" fill="#4da88a" font-size="10">GET /dashboard-stats</text>

  <rect x="258" y="332" width="144" height="74" rx="6" fill="#061e16" stroke="#555" stroke-width="0.6"/>
  <text x="330" y="354" text-anchor="middle" fill="#7ecfb3" font-size="12" font-weight="600">Interview routes</text>
  <text x="330" y="372" text-anchor="middle" fill="#4da88a" font-size="10">POST /generate-questions</text>
  <text x="330" y="390" text-anchor="middle" fill="#4da88a" font-size="10">POST /interview-results</text>

  <rect x="416" y="332" width="162" height="74" rx="6" fill="#061e16" stroke="#555" stroke-width="0.6"/>
  <text x="497" y="354" text-anchor="middle" fill="#7ecfb3" font-size="12" font-weight="600">AI routes</text>
  <text x="497" y="372" text-anchor="middle" fill="#4da88a" font-size="10">POST /analyze-resume</text>
  <text x="497" y="390" text-anchor="middle" fill="#4da88a" font-size="10">POST /analyze-code</text>

  <!-- Arrow Backend to DB -->
  <line x1="210" y1="420" x2="210" y2="488" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Arrow Backend to Groq -->
  <line x1="480" y1="420" x2="480" y2="488" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- POSTGRESQL -->
  <rect x="60" y="490" width="300" height="130" rx="12" fill="#0d1f3a" stroke="#2a6aad" stroke-width="0.8"/>
  <text x="210" y="514" text-anchor="middle" fill="#80b8e8" font-size="13" font-weight="600">PostgreSQL Database</text>
  <text x="210" y="532" text-anchor="middle" fill="#5090c8" font-size="11">Render Managed</text>

  <rect x="78" y="544" width="122" height="62" rx="6" fill="#061224" stroke="#555" stroke-width="0.6"/>
  <text x="139" y="566" text-anchor="middle" fill="#80b8e8" font-size="12" font-weight="600">users</text>
  <text x="139" y="584" text-anchor="middle" fill="#5090c8" font-size="10">id, email, name</text>

  <rect x="212" y="544" width="134" height="62" rx="6" fill="#061224" stroke="#555" stroke-width="0.6"/>
  <text x="279" y="566" text-anchor="middle" fill="#80b8e8" font-size="12" font-weight="600">interview_results</text>
  <text x="279" y="584" text-anchor="middle" fill="#5090c8" font-size="10">scores, feedback</text>

  <!-- GROQ AI -->
  <rect x="390" y="490" width="240" height="130" rx="12" fill="#2e1f00" stroke="#9a6a00" stroke-width="0.8"/>
  <text x="510" y="514" text-anchor="middle" fill="#f0c060" font-size="13" font-weight="600">Groq AI API</text>
  <text x="510" y="532" text-anchor="middle" fill="#c09040" font-size="11">LLaMA 3.1 8B Instant</text>

  <rect x="408" y="544" width="100" height="62" rx="6" fill="#1a1000" stroke="#555" stroke-width="0.6"/>
  <text x="458" y="566" text-anchor="middle" fill="#f0c060" font-size="12" font-weight="600">Questions</text>
  <text x="458" y="584" text-anchor="middle" fill="#c09040" font-size="10">AI generated</text>

  <rect x="520" y="544" width="100" height="62" rx="6" fill="#1a1000" stroke="#555" stroke-width="0.6"/>
  <text x="570" y="566" text-anchor="middle" fill="#f0c060" font-size="12" font-weight="600">Feedback</text>
  <text x="570" y="584" text-anchor="middle" fill="#c09040" font-size="10">AI evaluated</text>

  <!-- PyMuPDF -->
  <rect x="270" y="638" width="140" height="50" rx="8" fill="#3a1010" stroke="#9a3a2a" stroke-width="0.8"/>
  <text x="340" y="660" text-anchor="middle" fill="#f08070" font-size="12" font-weight="600">PyMuPDF</text>
  <text x="340" y="678" text-anchor="middle" fill="#c06050" font-size="10">PDF resume parsing</text>
  <line x1="350" y1="638" x2="460" y2="492" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
